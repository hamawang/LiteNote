<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>LiteNote 视频封面</title>
  <!--
    导出 PNG：在项目根目录执行  pnpm run export:cover
    输出：docs/images/video-cover.png（1920×1080）
  -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    .cover {
      --blue: #5fa5cd;
      --blue-deep: #2d6991;
      --gold: #facc15;
      --ink: #0a0e14;
      --ink-2: #111827;
      position: relative;
      width: 1920px;
      height: 1080px;
      color: #fff;
      overflow: hidden;
      background:
        radial-gradient(ellipse 55% 45% at 8% 18%, rgba(95, 165, 205, 0.22), transparent 60%),
        radial-gradient(ellipse 50% 40% at 92% 82%, rgba(45, 105, 145, 0.18), transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 100%, rgba(56, 189, 248, 0.08), transparent 50%),
        linear-gradient(155deg, #0a0e14 0%, #0f141c 42%, #101822 100%);
    }

    /* 细网格纹理 */
    .cover::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 90% 80% at 50% 45%, black 20%, transparent 85%);
      pointer-events: none;
    }

    /* 背景毛玻璃小窗装饰 */
    .glass-float {
      position: absolute;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(
        165deg,
        rgba(95, 165, 205, 0.14) 0%,
        rgba(45, 105, 145, 0.08) 100%
      );
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .glass-float.g1 {
      width: 300px;
      height: 200px;
      top: 72px;
      left: 480px;
      transform: rotate(-5deg);
      opacity: 0.55;
    }

    .glass-float.g2 {
      width: 240px;
      height: 320px;
      bottom: 80px;
      left: 560px;
      transform: rotate(4deg);
      opacity: 0.35;
    }

    .glass-float.g3 {
      width: 200px;
      height: 140px;
      top: 160px;
      right: 140px;
      opacity: 0.28;
      transform: rotate(3deg);
    }

    .glass-float.g4 {
      width: 260px;
      height: 180px;
      bottom: 140px;
      right: 100px;
      opacity: 0.22;
      transform: rotate(-3deg);
    }

    .layout {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 96px 0 112px;
      gap: 72px;
    }

    /* 左侧品牌 */
    .brand {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 360px;
    }

    .icon-glow {
      position: relative;
      padding: 12px;
    }

    .icon-glow::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 68px;
      background: radial-gradient(circle, rgba(95, 165, 205, 0.45) 0%, transparent 70%);
      filter: blur(20px);
    }

    .app-icon {
      position: relative;
      width: 288px;
      height: 288px;
      border-radius: 58px;
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.1);
      object-fit: cover;
    }

    .brand-cn {
      margin-top: 28px;
      font-size: 30px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.42em;
      text-indent: 0.42em;
    }

    /* 右侧文案区 — 毛玻璃底 */
    .copy-panel {
      flex: 1;
      padding: 52px 56px 48px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.07) 0%,
        rgba(255, 255, 255, 0.03) 100%
      );
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 20px;
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid rgba(95, 165, 205, 0.35);
      background: rgba(95, 165, 205, 0.1);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: rgba(147, 197, 253, 0.95);
    }

    .title {
      font-size: 68px;
      font-weight: 800;
      line-height: 1.12;
      letter-spacing: 0.01em;
      margin-bottom: 22px;
    }

    .title span {
      background: linear-gradient(90deg, #fff 0%, rgba(255, 255, 255, 0.88) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 54px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 0.08em;
      margin-bottom: 40px;
      text-shadow: 0 0 40px rgba(250, 204, 21, 0.2);
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 40px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 26px;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.88);
    }

    .feature-dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 10px rgba(95, 165, 205, 0.6);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 44px;
      padding-top: 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .platform {
      font-size: 22px;
      color: rgba(255, 255, 255, 0.42);
      letter-spacing: 0.06em;
    }

    .pill-row {
      display: flex;
      gap: 10px;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 17px;
      color: rgba(255, 255, 255, 0.55);
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="glass-float g1"></div>
    <div class="glass-float g2"></div>
    <div class="glass-float g3"></div>
    <div class="glass-float g4"></div>

    <div class="layout">
      <div class="brand">
        <div class="icon-glow">
          <img
            class="app-icon"
            src="images/app-icon.png"
            width="288"
            height="288"
            alt="LiteNote"
          />
        </div>
        <div class="brand-cn">轻 签</div>
      </div>

      <div class="copy-panel">
        <span class="eyebrow">DESKTOP WIDGET</span>
        <h1 class="title"><span>LiteNote 桌面待办小部件</span></h1>
        <p class="tagline">专注 · 极简 · 本地</p>

        <div class="features">
          <div class="feature"><span class="feature-dot"></span>本地 SQLite 存储，数据在己</div>
          <div class="feature"><span class="feature-dot"></span>毛玻璃小部件，托盘轻量常驻</div>
          <div class="feature"><span class="feature-dot"></span>循环待办 &amp; 截止提醒</div>
          <div class="feature"><span class="feature-dot"></span>多主题切换 · 内嵌设置</div>
          <div class="feature"><span class="feature-dot"></span>周日历视图 · 拖拽排序</div>
          <div class="feature"><span class="feature-dot"></span>全局快捷键，随时唤出</div>
        </div>

        <div class="footer">
          <p class="platform">跨平台支持 Windows / macOS</p>
          <div class="pill-row">
            <span class="pill">Tauri</span>
            <span class="pill">本地优先</span>
            <span class="pill">无广告</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
